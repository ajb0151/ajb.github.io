<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal BRI Ajibarang</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    body {
        background-color: #2f5ea7;
        color: white;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* HEADER */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        flex-wrap: wrap;
    }

    .logo {
        font-size: 14px;
        font-weight: bold;
    }

    /* TITLE */
    .title {
        text-align: center;
        margin-top: 40px;
        padding: 0 15px;
        font-size: clamp(16px, 3vw, 22px);
        font-weight: bold;
        line-height: 1.5;
    }

    /* MENU GRID */
    .menu-container {
        margin: 40px auto;
        width: 100%;
        max-width: 800px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 20px;
        padding: 0 20px;
    }

    .menu {
        aspect-ratio: 1/1;
        background-color: #5fa6c9;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: clamp(14px, 2vw, 18px);
        cursor: pointer;
        transition: 0.3s;
        border: 3px solid #a8d4e6;
    }

    .menu:hover {
        background-color: #7fc0df;
        transform: scale(1.05);
    }

    /* TIME */
    .time {
        text-align: center;
        margin-top: auto;
        padding: 20px;
        font-size: clamp(12px, 2vw, 14px);
    }

    /* FOOTER */
    .footer {
        text-align: center;
        padding-bottom: 15px;
        font-size: 12px;
    }

    /* RESPONSIVE BREAKPOINT */
    @media (max-width: 480px) {
        .header {
            flex-direction: column;
            gap: 10px;
        }
    }

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">Danantara Indonesia</div>
    <div class="logo">sedulur ajibarang</div>
</div>

<!-- TITLE -->
<div class="title">
    SELAMAT DATANG DI PORTAL <br>
    BRI BRANCH OFFICE AJIBARANG
</div>

<!-- MENU -->
<div class="menu-container">
    <div class="menu" onclick="goTo('dana')">DANA</div>
    <div class="menu" onclick="goTo('ritel')">RITEL</div>
    <div class="menu" onclick="goTo('mikro')">MIKRO</div>
    <div class="menu" onclick="goTo('zoom')">Zoom</div>
</div>

<!-- TIME -->
<div class="time" id="time"></div>

<!-- FOOTER -->
<div class="footer">
    @2026 | IT BRI BO Ajibarang
</div>

<script>
    function updateTime() {
        const now = new Date();

        const date = now.toLocaleDateString('id-ID', {
            day: 'numeric',
            month: 'long',
            year: 'numeric'
        });

        const time = now.toLocaleTimeString('id-ID');

        document.getElementById("time").innerHTML =
            date + " | " + time + " WIB";
    }

    setInterval(updateTime, 1000);
    updateTime();

    // 🔗 LINK GOOGLE DRIVE
    function goTo(menu) {

        const links = {
            dana: "https://drive.google.com/file/d/15DFoS2OdMPdou5WAbzUqd24ydINTursn/view?usp=sharing",
            ritel: "https://drive.google.com/drive/folders/ISI_LINK_RITEL",
            mikro: "https://drive.google.com/drive/folders/ISI_LINK_MIKRO",
            zoom: "https://drive.google.com/drive/folders/ISI_LINK_ZOOM"
        };

        // buka di tab baru
        window.open(links[menu], "_blank");
    }
</script>

</body>
</html>
